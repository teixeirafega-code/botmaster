services:
  - type: worker
    name: botmaster-asset-flip
    runtime: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m app.main scheduler
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: BOT_ID
        value: asset
      - key: BOTMASTER_STATUS_TOKEN
        sync: false
      - key: BOTMASTER_STATUS_ENDPOINT
        sync: false
      - key: PAPER_MODE
        value: "true"
