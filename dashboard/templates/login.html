<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BotMaster Dashboard Login</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b12;
      --panel: #111827;
      --panel-2: #172033;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, .22);
      --focus: #38bdf8;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, .12), transparent 32rem), var(--bg);
      color: var(--text);
    }
    .login-shell {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(23, 32, 51, .94), rgba(17, 24, 39, .98));
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .36);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    input {
      width: 100%;
      height: 46px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 15px;
    }
    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, .16);
    }
    button {
      width: 100%;
      height: 46px;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      background: #38bdf8;
      color: #06111f;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin: 14px 0 0;
      color: var(--danger);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <h1>BotMaster Dashboard</h1>
    <p>Secure access for the automated bot control panel.</p>
    <form method="post" action="{{ url_for('login') }}">
      <label for="password">Dashboard password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Sign in</button>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>
  </main>
</body>
</html>
