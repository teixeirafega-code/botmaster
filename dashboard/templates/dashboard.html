<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel BotMaster</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: #0b111c;
      --panel-2: #0f1724;
      --panel-3: #111b2b;
      --line: rgba(148, 163, 184, .18);
      --line-strong: rgba(148, 163, 184, .32);
      --text: #e5eefb;
      --muted: #8ea0b8;
      --green: #22c55e;
      --green-soft: rgba(34, 197, 94, .13);
      --blue: #38bdf8;
      --amber: #f59e0b;
      --purple: #a78bfa;
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, .14);
      --yellow-soft: rgba(245, 158, 11, .14);
      --shadow: 0 18px 46px rgba(0, 0, 0, .34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(180deg, rgba(56, 189, 248, .05), transparent 260px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .018), rgba(255, 255, 255, .018) 1px, transparent 1px, transparent 34px),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell {
      width: min(1500px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: 26px;
      letter-spacing: 0;
      line-height: 1.15;
    }
    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill, .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(15, 23, 36, .78);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }
    .logout {
      height: 32px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 36, .84);
      color: var(--text);
      border-radius: 6px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .summary-card, .bot-card, .activity {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(17, 27, 43, .94), rgba(9, 14, 24, .98));
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .summary-card {
      min-height: 112px;
      padding: 15px;
      position: relative;
      overflow: hidden;
    }
    .summary-card::after {
      content: "";
      position: absolute;
      inset: auto 12px 0 12px;
      height: 2px;
      background: var(--line);
    }
    .summary-card.good::after { background: var(--green); }
    .summary-card.warning::after { background: var(--amber); }
    .summary-card.danger::after { background: var(--red); }
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .summary-value {
      margin-top: 10px;
      font-size: 30px;
      font-weight: 850;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    .summary-caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .bot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .bot-card {
      min-height: 420px;
      padding: 16px;
      overflow: hidden;
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .bot-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .accent-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 18px currentColor;
      color: var(--blue);
      flex: 0 0 auto;
    }
    .accent-green .accent-dot { background: var(--green); color: var(--green); }
    .accent-blue .accent-dot { background: var(--blue); color: var(--blue); }
    .accent-amber .accent-dot { background: var(--amber); color: var(--amber); }
    .accent-purple .accent-dot { background: var(--purple); color: var(--purple); }
    .bot-card h2 {
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 12px var(--red);
    }
    .status.running {
      color: #c7f9d8;
      border-color: rgba(34, 197, 94, .38);
      background: var(--green-soft);
    }
    .status.running::before {
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-bottom: 14px;
    }
    .metric {
      min-height: 76px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(5, 7, 11, .48);
    }
    .metric-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 19px;
      font-weight: 820;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }
    .tone-good { color: var(--green); }
    .tone-warning { color: var(--amber); }
    .tone-danger { color: var(--red); }
    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: #d8e2f0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 850;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 36, .8);
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }
    .badge.good {
      color: #c7f9d8;
      background: var(--green-soft);
      border-color: rgba(34, 197, 94, .34);
    }
    .badge.warning {
      color: #ffe2aa;
      background: var(--yellow-soft);
      border-color: rgba(245, 158, 11, .38);
    }
    .badge.danger {
      color: #fecaca;
      background: var(--red-soft);
      border-color: rgba(239, 68, 68, .38);
    }
    .chart-wrap {
      height: 154px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(5, 7, 11, .62), rgba(5, 7, 11, .28));
      padding: 10px;
    }
    .chart-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .apy-row, .domain-row, .trend-row, .feed-row {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(5, 7, 11, .42);
    }
    .apy-compare {
      display: grid;
      gap: 9px;
    }
    .apy-bar-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 76px;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .apy-bar-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, .18);
      border: 1px solid rgba(148, 163, 184, .12);
    }
    .apy-bar-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }
    .apy-bar-fill.best {
      background: var(--green);
      box-shadow: 0 0 16px rgba(34, 197, 94, .36);
    }
    .apy-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .apy-row {
      padding: 10px;
      min-width: 0;
    }
    .row-label {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .row-value {
      margin-top: 6px;
      font-size: 17px;
      font-weight: 850;
    }
    .data-list {
      display: grid;
      gap: 8px;
    }
    .domain-row, .trend-row {
      padding: 10px 11px;
    }
    .split {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }
    .truncate {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      background: rgba(5, 7, 11, .38);
    }
    .mini-stat strong {
      display: block;
      margin-top: 5px;
      font-size: 18px;
    }
    .asset-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .filter-group {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(5, 7, 11, .44);
    }
    .filter-button {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }
    .filter-button:last-child { border-right: 0; }
    .filter-button.active {
      color: #c7f9d8;
      background: var(--green-soft);
    }
    .asset-row {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) repeat(3, minmax(86px, .28fr)) 68px;
      gap: 10px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(5, 7, 11, .42);
    }
    .asset-link, .link-button {
      color: var(--blue);
      text-decoration: none;
      font-weight: 850;
    }
    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid rgba(56, 189, 248, .36);
      border-radius: 6px;
      background: rgba(56, 189, 248, .10);
      white-space: nowrap;
    }
    .asset-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .score-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, .18);
      overflow: hidden;
      margin-top: 8px;
    }
    .score-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--amber);
    }
    .score-fill.good { background: var(--green); }
    .score-fill.warning { background: var(--amber); }
    .score-fill.danger { background: var(--red); }
    .platforms {
      display: inline-flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .platform {
      min-width: 25px;
      height: 25px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line-strong);
      color: var(--text);
      background: rgba(15, 23, 36, .9);
      font-size: 10px;
      font-weight: 900;
    }
    .velocity-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 7px;
    }
    .activity {
      margin-top: 14px;
      padding: 16px;
    }
    .safety-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(17, 27, 43, .94), rgba(9, 14, 24, .98));
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .safety-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .safety-header h2 {
      font-size: 18px;
      letter-spacing: 0;
      line-height: 1.2;
    }
    .safety-statuses {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .safety-button {
      min-height: 32px;
      border: 1px solid rgba(56, 189, 248, .36);
      border-radius: 6px;
      background: rgba(56, 189, 248, .10);
      color: var(--blue);
      padding: 0 11px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 850;
    }
    .safety-button:disabled {
      cursor: wait;
      opacity: .68;
    }
    .report-status {
      flex-basis: 100%;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
    .safety-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }
    .safety-card {
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 11px;
      background: rgba(5, 7, 11, .42);
    }
    .safety-value {
      margin-top: 7px;
      font-size: 21px;
      line-height: 1.1;
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .safety-chart-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, .9fr) minmax(0, .75fr);
      gap: 12px;
    }
    .chart-card {
      min-height: 214px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
      background: rgba(5, 7, 11, .36);
    }
    .bar-list {
      display: grid;
      gap: 9px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, .55fr) minmax(0, 1fr) 42px;
      gap: 9px;
      align-items: center;
      min-width: 0;
    }
    .bar-track {
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, .12);
      background: rgba(148, 163, 184, .18);
    }
    .bar-fill {
      height: 100%;
      min-width: 0;
      width: 0;
      border-radius: inherit;
      background: var(--blue);
    }
    .bar-fill.good { background: var(--green); }
    .bar-fill.warning { background: var(--amber); }
    .bar-fill.danger { background: var(--red); }
    .timeline-bars {
      display: grid;
      grid-template-columns: repeat(14, minmax(0, 1fr));
      align-items: end;
      gap: 5px;
      height: 132px;
      padding-top: 8px;
    }
    .timeline-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      height: 100%;
      min-width: 0;
    }
    .timeline-bar span {
      width: 100%;
      min-height: 3px;
      border-radius: 999px 999px 3px 3px;
      background: var(--amber);
    }
    .timeline-bar small {
      color: var(--muted);
      font-size: 9px;
      white-space: nowrap;
      transform: rotate(-44deg);
      transform-origin: center;
    }
    .feed-row {
      display: grid;
      grid-template-columns: 152px 122px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px 11px;
    }
    .feed-time, .feed-bot {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 7px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(5, 7, 11, .28);
    }
    @media (max-width: 1180px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .apy-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .mini-stats, .safety-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .safety-chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .bot-grid { grid-template-columns: 1fr; }
      .asset-row { grid-template-columns: minmax(0, 1fr) repeat(2, minmax(86px, .4fr)); }
      .asset-row .hide-mobile { display: none; }
      .feed-row { grid-template-columns: 1fr; gap: 4px; }
    }
    @media (max-width: 580px) {
      .shell { width: min(100vw - 20px, 1500px); padding-top: 16px; }
      h1 { font-size: 22px; }
      .summary-value { font-size: 25px; }
      .summary-grid, .metric-grid, .apy-grid, .mini-stats, .safety-grid { grid-template-columns: 1fr; }
      .safety-header { flex-direction: column; }
      .card-top { align-items: flex-start; flex-direction: column; }
      .asset-row { grid-template-columns: 1fr; }
      .summary-card, .bot-card, .activity { border-radius: 7px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Painel BotMaster</h1>
        <div class="subtle">Ultima atualizacao: <span id="generated-at">{{ snapshot.generated_label }}</span></div>
      </div>
      <div class="actions">
        <span class="pill">Atualizacao automatica: 2s</span>
        <span class="pill"><span id="running-count">{{ snapshot.running_count }}</span> rodando</span>
        <span class="pill"><span id="stopped-count">{{ snapshot.stopped_count }}</span> parados</span>
        <form method="post" action="{{ url_for('logout') }}">
          <button class="logout" type="submit">Sair</button>
        </form>
      </div>
    </header>

    <section class="summary-grid" id="summary"></section>
    <section class="bot-grid" id="cards"></section>
    <section class="safety-panel" id="domain-safety"></section>

    <section class="activity">
      <div class="section-title">
        <span>Feed de Atividades</span>
        <span class="badge">Ultimos 20 eventos</span>
      </div>
      <div class="data-list" id="activity-feed"></div>
    </section>
  </main>

  <script id="initial-data" type="application/json">{{ snapshot|json_script|safe }}</script>
  <script>
    var assetScoreFilter = 70;
    var domainValidationReportStatus = "";

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toneClass(tone) {
      return tone ? " tone-" + escapeHtml(tone) : "";
    }

    function statusLabel(status) {
      if (status === "RUNNING") return "RODANDO";
      if (status === "STOPPED") return "PARADO";
      if (status === "ERROR") return "ERRO";
      return status || "DESCONHECIDO";
    }

    function renderSummary(summary) {
      var html = (summary || []).map(function(item) {
        return '<article class="summary-card ' + escapeHtml(item.tone || "neutral") + '">' +
          '<div class="summary-label">' + escapeHtml(item.label) + '</div>' +
          '<div class="summary-value' + toneClass(item.tone) + '">' + escapeHtml(item.value) + '</div>' +
          '<div class="summary-caption">' + escapeHtml(item.caption || "") + '</div>' +
        '</article>';
      }).join("");
      document.getElementById("summary").innerHTML = html;
    }

    function renderMetrics(metrics) {
      return '<div class="metric-grid">' + (metrics || []).map(function(metric) {
        return '<div class="metric">' +
          '<div class="metric-label">' + escapeHtml(metric.label) + '</div>' +
          '<div class="metric-value' + toneClass(metric.tone) + '">' + escapeHtml(metric.value) + '</div>' +
        '</div>';
      }).join("") + '</div>';
    }

    function chartSvg(points) {
      points = points || [];
      if (points.length < 2) {
        return '<div class="empty">Sem historico de APY</div>';
      }
      var values = points.map(function(point) { return Number(point.value) || 0; });
      var min = Math.min.apply(null, values);
      var max = Math.max.apply(null, values);
      var spread = Math.max(max - min, 0.01);
      var coords = points.map(function(point, index) {
        var x = (index / (points.length - 1)) * 100;
        var y = 92 - (((Number(point.value) || 0) - min) / spread) * 76;
        return x.toFixed(2) + "," + y.toFixed(2);
      }).join(" ");
      var last = points[points.length - 1];
      return '<svg viewBox="0 0 100 100" preserveAspectRatio="none" role="img">' +
        '<defs><linearGradient id="apyLine" x1="0" x2="1" y1="0" y2="0"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient></defs>' +
        '<line x1="0" y1="20" x2="100" y2="20" stroke="rgba(148,163,184,.15)" stroke-width=".5"/>' +
        '<line x1="0" y1="56" x2="100" y2="56" stroke="rgba(148,163,184,.13)" stroke-width=".5"/>' +
        '<line x1="0" y1="92" x2="100" y2="92" stroke="rgba(148,163,184,.13)" stroke-width=".5"/>' +
        '<polyline fill="none" stroke="url(#apyLine)" stroke-width="2.2" vector-effect="non-scaling-stroke" points="' + coords + '"/>' +
        '<text x="2" y="10" fill="#8ea0b8" font-size="5">' + escapeHtml(last.protocol) + ' ' + escapeHtml(last.value_label) + '</text>' +
      '</svg>';
    }

    function renderApyComparison(apys) {
      apys = apys || [];
      var max = apys.reduce(function(value, item) {
        return Math.max(value, Number(item.raw || 0));
      }, 0.0001);
      return '<div class="apy-compare">' + apys.map(function(item) {
        var raw = Number(item.raw || 0);
        var width = Math.max(3, Math.min(100, (raw / max) * 100));
        return '<div class="apy-bar-row">' +
          '<span class="row-label">' + escapeHtml(item.protocol) + '</span>' +
          '<div class="apy-bar-track"><div class="apy-bar-fill ' + (item.is_best ? 'best' : '') + '" style="width:' + width.toFixed(2) + '%"></div></div>' +
          '<strong class="' + (item.is_best ? 'tone-good' : '') + '">' + escapeHtml(item.value) + '</strong>' +
        '</div>';
      }).join("") + '</div>';
    }

    function renderYield(card) {
      var apys = (card.apys || []).map(function(item) {
        return '<div class="apy-row">' +
          '<div class="split"><span class="row-label">' + escapeHtml(item.protocol) + '</span>' +
          (item.is_best ? '<span class="badge good">MELHOR</span>' : '') + '</div>' +
          '<div class="row-value' + (item.is_best ? ' tone-good' : '') + '">' + escapeHtml(item.value) + '</div>' +
        '</div>';
      }).join("");
      return renderMetrics(card.metrics) +
        '<div class="section"><div class="section-title"><span>Historico de APY</span><span class="badge good">' +
        escapeHtml(card.best_protocol) + ' ' + escapeHtml(card.best_apy_label) + '</span></div>' +
        '<div class="chart-wrap">' + chartSvg(card.chart && card.chart.points) + '</div></div>' +
        '<div class="section"><div class="section-title"><span>Comparacao de APY</span><span class="badge good">Melhor protocolo</span></div>' +
        renderApyComparison(card.apys) + '</div>' +
        '<div class="section"><div class="section-title"><span>APYs por Protocolo</span><span class="badge">' +
        escapeHtml(card.capital_label || "$140.00") + ' de capital</span></div><div class="apy-grid">' + apys + '</div></div>';
    }

    function renderDomain(card) {
      var inventory = card.inventory || {};
      var top = (card.top_domains || []).map(function(item) {
        return '<div class="domain-row"><div class="split">' +
          '<div class="truncate"><strong>' + escapeHtml(item.name) + '</strong><div class="subtle">Venda estimada ' + escapeHtml(item.estimated_sale_price_label) + '</div></div>' +
          '<span class="badge ' + escapeHtml(item.tone) + '">' + escapeHtml(item.score_label) + '</span>' +
        '</div></div>';
      }).join("") || '<div class="empty">Nenhum dominio pontuado hoje</div>';
      return renderMetrics(card.metrics) +
        '<div class="section"><div class="section-title"><span>Portfolio</span><span class="badge good">' +
        escapeHtml(inventory.portfolio_value_label || "$0.00") + '</span></div>' +
        '<div class="mini-stats">' +
        miniStat("Registrados", inventory.registered_label || "0", "good") +
        miniStat("Listados", inventory.listed_label || "0", "warning") +
        miniStat("Vendidos", inventory.sold_label || "0", "good") +
        miniStat("Valor", inventory.portfolio_value_label || "$0.00", "good") +
        '</div></div>' +
        '<div class="section"><div class="section-title"><span>Principais Dominios Hoje</span><span class="badge">Top 5</span></div><div class="data-list">' + top + '</div></div>';
    }

    function miniStat(label, value, tone) {
      return '<div class="mini-stat"><span class="row-label">' + escapeHtml(label) + '</span><strong class="tone-' +
        escapeHtml(tone) + '">' + escapeHtml(value) + '</strong></div>';
    }

    function renderAsset(card) {
      var filtered = (card.top_opportunities || []).filter(function(item) {
        return Number(item.score || 0) >= assetScoreFilter;
      }).slice(0, 3);
      var rows = filtered.map(function(item) {
        return '<div class="asset-row">' +
          '<div class="truncate"><a class="asset-link" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">' +
          escapeHtml(item.name) + '</a><div class="subtle">' + escapeHtml(item.marketplace) + ' | score ' + escapeHtml(item.score_label) + '</div></div>' +
          '<div><div class="asset-label">Pedido</div><strong>' + escapeHtml(item.asking_label) + '</strong></div>' +
          '<div><div class="asset-label">Valor Real</div><strong class="tone-good">' + escapeHtml(item.value_label) + '</strong></div>' +
          '<div><div class="asset-label">Lucro %</div><strong class="tone-good">' + escapeHtml(item.profit_percent_label) + '</strong></div>' +
          '<a class="link-button" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">Abrir</a>' +
        '</div>';
      }).join("") || '<div class="empty">Nenhuma oportunidade corresponde a este filtro de score</div>';
      return renderMetrics(card.metrics) +
        '<div class="section"><div class="asset-toolbar"><div class="section-title" style="margin:0"><span>Principais Oportunidades</span></div>' +
        '<div class="filter-group" data-filter-group="asset">' +
        filterButton(70) + filterButton(80) + filterButton(90) +
        '</div></div><div class="data-list">' + rows + '</div></div>';
    }

    function filterButton(score) {
      return '<button class="filter-button ' + (assetScoreFilter === score ? 'active' : '') +
        '" type="button" data-score-filter="' + score + '">' + score + '+</button>';
    }

    function renderTrend(card) {
      var rows = (card.top_trends || []).map(function(item) {
        var badges = (item.platform_badges || []).map(function(platform) {
          return '<span class="platform" title="' + escapeHtml(platform.name) + '">' + escapeHtml(platform.name) + '</span>';
        }).join("");
        return '<div class="trend-row">' +
          '<div class="split"><div class="truncate"><strong>' + escapeHtml(item.name) + '</strong><div class="subtle">' +
          'sinais ' + escapeHtml(item.signal_count || 0) + '</div></div><div class="platforms">' + badges + '</div></div>' +
          '<div class="score-bar"><div class="score-fill ' + escapeHtml(item.tone) + '" style="width:' + escapeHtml(item.score_width) + '%"></div></div>' +
          '<div class="velocity-line subtle"><span class="badge ' + escapeHtml(item.velocity_tone) + '">' + escapeHtml(item.velocity) + '</span>' +
          '<span>Score <strong class="tone-' + escapeHtml(item.tone) + '">' + escapeHtml(item.score_label) + '</strong></span></div>' +
        '</div>';
      }).join("") || '<div class="empty">Nenhuma tendencia disponivel</div>';
      return renderMetrics(card.metrics) +
        '<div class="section"><div class="section-title"><span>Principais Tendencias</span><span class="badge">Reddit / Google / X</span></div><div class="data-list">' + rows + '</div></div>';
    }

    function renderCard(card) {
      var body = "";
      if (card.id === "yield") body = renderYield(card);
      else if (card.id === "domain") body = renderDomain(card);
      else if (card.id === "asset") body = renderAsset(card);
      else if (card.id === "trend") body = renderTrend(card);
      else body = renderMetrics(card.metrics);
      return '<article class="bot-card accent-' + escapeHtml(card.accent) + '" data-card-id="' + escapeHtml(card.id) + '">' +
        '<div class="card-top"><div class="bot-title"><span class="accent-dot"></span><div><h2>' + escapeHtml(card.name) +
        '</h2><div class="subtle">Atualizado: ' + escapeHtml(card.last_update) + '</div></div></div>' +
        '<span class="status ' + (card.status === "RUNNING" ? "running" : "") + '">' + escapeHtml(statusLabel(card.status)) + '</span></div>' +
        body + '</article>';
    }

    function renderSafetyPanel(panel) {
      panel = panel || {};
      var counts = panel.counts || {};
      var flow = panel.flow || {};
      var charts = panel.charts || {};
      var html = '<div class="safety-header"><div><h2>Seguranca do Domain Hunter</h2>' +
        '<div class="subtle">Tentativas em dry-run nao sao compras reais. Aprovacoes pendentes nao sao dominios possuidos.</div></div>' +
        '<div class="safety-statuses">' +
        '<span class="badge ' + escapeHtml(panel.safe_mode_tone || "warning") + '">SAFE_MODE ' + escapeHtml(panel.safe_mode_label || "DESCONHECIDO") + '</span>' +
        '<span class="badge ' + escapeHtml(panel.dry_run_purchases_tone || "warning") + '">DRY_RUN_PURCHASES ' + escapeHtml(panel.dry_run_purchases_label || "DESCONHECIDO") + '</span>' +
        '<button class="safety-button" type="button" data-generate-domain-report>Gerar Relatorio de Validacao de 7 Dias</button>' +
        '<div class="report-status">' + escapeHtml(domainValidationReportStatus) + '</div>' +
        '</div></div>' +
        '<div class="section"><div class="section-title"><span>Fila de Revisao</span><span class="badge">Baseada em arquivo</span></div>' +
        '<div class="safety-grid">' +
        safetyCard("Aprovacoes pendentes", counts.pending_approvals || 0, "warning") +
        safetyCard("Tentativas de compra dry-run", counts.dry_run_purchase_attempts || 0, "good") +
        safetyCard("Dominios aprovados manualmente", counts.manually_approved_domains || 0, "good") +
        safetyCard("Compras reais", counts.real_purchases || 0, (counts.real_purchases || 0) ? "danger" : "neutral") +
        '</div></div>' +
        '<div class="section"><div class="section-title"><span>Bloqueios de Seguranca</span><span class="badge">Logs de decisao</span></div>' +
        '<div class="safety-grid">' +
        safetyCard("Bloqueados por marca", counts.blocked_by_trademark || 0, "danger") +
        safetyCard("Bloqueados por baixa liquidez", counts.blocked_by_low_liquidity || 0, "warning") +
        safetyCard("Bloqueados por orcamento", counts.blocked_by_budget || 0, "danger") +
        safetyCard("Bloqueados por cooldown", counts.blocked_by_cooldown || 0, "warning") +
        '</div></div>' +
        '<div class="section"><div class="section-title"><span>Fluxo de Capital</span><span class="badge">Contagens separadas</span></div>' +
        '<div class="safety-grid">' +
        safetyCard("Oportunidades encontradas", flow.opportunities_found || 0, "neutral") +
        safetyCard("Dominios aprovados", flow.domains_approved || 0, "good") +
        safetyCard("Dominios comprados", flow.domains_purchased || 0, (flow.domains_purchased || 0) ? "danger" : "neutral") +
        safetyCard("Dominios vendidos", flow.domains_sold || 0, "good") +
        '</div></div>' +
        '<div class="section"><div class="section-title"><span>Indicadores</span><span class="badge">Visao de risco</span></div>' +
        '<div class="safety-grid">' + (panel.kpis || []).map(function(item) {
          return safetyCard(item.label, item.value, item.tone || "neutral");
        }).join("") + '</div></div>' +
        '<div class="section"><div class="section-title"><span>Graficos</span><span class="badge">Atualizacao automatica</span></div>' +
        '<div class="safety-chart-grid">' +
        '<div class="chart-card"><div class="section-title"><span>Motivos de Rejeicao</span></div>' +
        horizontalBars(charts.rejection_reasons || [], "Nenhum motivo de rejeicao") + '</div>' +
        '<div class="chart-card"><div class="section-title"><span>Aprovacoes Pendentes ao Longo do Tempo</span></div>' +
        pendingTimeline(charts.pending_over_time || []) + '</div>' +
        '<div class="chart-card"><div class="section-title"><span>Taxa de Aprovacao</span></div>' +
        approvalRate(charts.approval_rate || []) + '</div>' +
        '</div></div>';
      document.getElementById("domain-safety").innerHTML = html;
    }

    function safetyCard(label, value, tone) {
      return '<div class="safety-card"><div class="metric-label">' + escapeHtml(label) + '</div>' +
        '<div class="safety-value tone-' + escapeHtml(tone || "neutral") + '">' + escapeHtml(value) + '</div></div>';
    }

    function horizontalBars(items, emptyText) {
      items = items || [];
      if (!items.length) return '<div class="empty">' + escapeHtml(emptyText) + '</div>';
      var max = items.reduce(function(value, item) { return Math.max(value, Number(item.value || 0)); }, 1);
      return '<div class="bar-list">' + items.map(function(item) {
        var width = Math.max(3, Math.min(100, (Number(item.value || 0) / max) * 100));
        return '<div class="bar-row"><span class="row-label truncate">' + escapeHtml(item.label) + '</span>' +
          '<div class="bar-track"><div class="bar-fill ' + escapeHtml(item.tone || "neutral") + '" style="width:' + width.toFixed(2) + '%"></div></div>' +
          '<strong>' + escapeHtml(item.value || 0) + '</strong></div>';
      }).join("") + '</div>';
    }

    function pendingTimeline(items) {
      items = items || [];
      if (!items.length) return '<div class="empty">Nenhum historico de aprovacao pendente</div>';
      var max = items.reduce(function(value, item) { return Math.max(value, Number(item.value || 0)); }, 1);
      return '<div class="timeline-bars">' + items.map(function(item) {
        var height = Math.max(3, Math.min(100, (Number(item.value || 0) / max) * 100));
        return '<div class="timeline-bar" title="' + escapeHtml(item.label) + ': ' + escapeHtml(item.value || 0) + '">' +
          '<span style="height:' + height.toFixed(2) + '%"></span><small>' + escapeHtml(item.label) + '</small></div>';
      }).join("") + '</div>';
    }

    function approvalRate(items) {
      var approved = 0;
      var pending = 0;
      var rate = 0;
      (items || []).forEach(function(item) {
        if (item.label === "Aprovados") approved = Number(item.value || 0);
        if (item.label === "Pendentes") pending = Number(item.value || 0);
        if (item.label === "Taxa") rate = Number(item.value || 0);
      });
      return '<div class="safety-grid" style="grid-template-columns:1fr; gap:8px">' +
        safetyCard("Aprovados", approved, "good") +
        safetyCard("Pendentes", pending, "warning") +
        '<div class="bar-list"><div class="bar-row" style="grid-template-columns:76px minmax(0,1fr) 54px">' +
        '<span class="row-label">Taxa</span><div class="bar-track"><div class="bar-fill good" style="width:' +
        Math.max(0, Math.min(100, rate)).toFixed(2) + '%"></div></div><strong>' + rate.toFixed(1) + '%</strong></div></div></div>';
    }

    function renderActivity(feed) {
      var html = (feed || []).map(function(item) {
        return '<div class="feed-row"><div class="feed-time">' + escapeHtml(item.time) + '</div>' +
          '<div class="feed-bot tone-' + escapeHtml(item.tone) + '">' + escapeHtml(item.bot) + '</div>' +
          '<div class="truncate">' + escapeHtml(item.message) + '</div></div>';
      }).join("") || '<div class="empty">Nenhum evento ainda</div>';
      document.getElementById("activity-feed").innerHTML = html;
    }

    function renderSnapshot(snapshot) {
      document.getElementById("generated-at").textContent = snapshot.generated_label;
      document.getElementById("running-count").textContent = snapshot.running_count;
      document.getElementById("stopped-count").textContent = snapshot.stopped_count;
      renderSummary(snapshot.summary);
      document.getElementById("cards").innerHTML = (snapshot.cards || []).map(renderCard).join("");
      renderSafetyPanel(snapshot.domain_safety);
      renderActivity(snapshot.activity_feed);
    }

    async function refresh() {
      try {
        var response = await fetch("{{ url_for('api_status') }}", {cache: "no-store"});
        if (response.status === 401) {
          window.location.href = "{{ url_for('login') }}";
          return;
        }
        if (!response.ok) return;
        renderSnapshot(await response.json());
      } catch (error) {
      }
    }

    document.addEventListener("click", function(event) {
      var reportButton = event.target.closest("[data-generate-domain-report]");
      if (reportButton) {
        generateDomainValidationReport(reportButton);
        return;
      }
      var button = event.target.closest("[data-score-filter]");
      if (!button) return;
      assetScoreFilter = Number(button.getAttribute("data-score-filter"));
      renderSnapshot(window.currentSnapshot);
    });

    async function generateDomainValidationReport(button) {
      button.disabled = true;
      button.textContent = "Gerando...";
      domainValidationReportStatus = "Gerando relatorio de validacao...";
      renderSnapshot(window.currentSnapshot);
      try {
        var response = await fetch("{{ url_for('api_domain_validation_report') }}", {method: "POST", cache: "no-store"});
        if (response.status === 401) {
          window.location.href = "{{ url_for('login') }}";
          return;
        }
        var payload = await response.json();
        if (!response.ok || !payload.ok) {
          domainValidationReportStatus = "Falha ao gerar relatorio.";
        } else {
          domainValidationReportStatus = (payload.partial ? "Relatorio parcial salvo: " : "Relatorio de 7 dias salvo: ") +
            payload.json_path + " e " + payload.html_path;
        }
      } catch (error) {
        domainValidationReportStatus = "Falha ao gerar relatorio.";
      } finally {
        renderSnapshot(window.currentSnapshot);
      }
    }

    var initialSnapshot = JSON.parse(document.getElementById("initial-data").textContent);
    window.currentSnapshot = initialSnapshot;
    var originalRenderSnapshot = renderSnapshot;
    renderSnapshot = function(snapshot) {
      window.currentSnapshot = snapshot;
      originalRenderSnapshot(snapshot);
    };
    renderSnapshot(initialSnapshot);
    setInterval(refresh, 2000);
  </script>
</body>
</html>
